name: Triage Assist

on:
  schedule:
    # Run every 6 hours to catch stale inbox items
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  triage-stale-inbox:
    runs-on: ubuntu-latest
    steps:
      - name: Flag inbox items older than 24h without triage
        uses: actions/github-script@v7
        with:
          script: |
            const STALE_HOURS = 24;
            const now = new Date();

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'status:inbox',
              per_page: 100,
            });

            for (const issue of issues) {
              const created = new Date(issue.created_at);
              const ageHours = (now - created) / (1000 * 60 * 60);

              if (ageHours < STALE_HOURS) continue;

              const labelNames = issue.labels.map(l => l.name);
              const hasTriageLabel = labelNames.some(l =>
                l === 'status:backlog' ||
                l === 'status:ready' ||
                l === 'status:needs-info'
              );
              if (hasTriageLabel) continue;

              const ageDisplay = ageHours < 48
                ? `${Math.round(ageHours)} hours`
                : `${Math.round(ageHours / 24)} days`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `> **Triage reminder:** This item has been in the inbox for ${ageDisplay}. Please triage it:\n> - Classify type and lane\n> - Check for duplicates\n> - Set priority and effort\n> - Move to \`Backlog\`, \`Ready\`, or \`Needs Info\``,
              });
            }

  triage-checklist:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Generate triage summary of all inbox items
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'status:inbox',
              per_page: 100,
            });

            if (issues.length === 0) {
              core.info('Inbox is empty — nothing to triage.');
              return;
            }

            let summary = `## Triage Queue\n\n`;
            summary += `**${issues.length}** item(s) awaiting triage.\n\n`;

            for (const issue of issues) {
              const labels = issue.labels.map(l => l.name).join(', ');
              const age = Math.round(
                (Date.now() - new Date(issue.created_at)) / (1000 * 60 * 60)
              );
              summary += `- [ ] #${issue.number} — ${issue.title} (${age}h old) [${labels}]\n`;
            }

            summary += `\n---\n`;
            summary += `For each item, decide: **Backlog** / **Ready** / **Needs Info** / **Duplicate** / **Close**`;

            core.summary.addRaw(summary);
            await core.summary.write();
