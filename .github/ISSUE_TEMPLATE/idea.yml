name: Idea / Feedback
description: Capture an idea, observation, or user feedback that may lead to future work.
labels: ["type:idea", "status:inbox"]
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Idea / Opportunity
        - User Feedback
        - Product Observation
        - App Store Feedback
    validations:
      required: true

  - type: dropdown
    id: project
    attributes:
      label: Project
      description: Which project does this relate to? Select "Portfolio-wide" if it spans multiple.
      options:
