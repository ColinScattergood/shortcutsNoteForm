        - watchsync
        - wellaware
        - wellawareapp
        - whatisthebestcreditcardformeapp
        - WindDown
        - windowed
        - zip-to-prompt-pal
    validations:
      required: true

  - type: dropdown
    id: source
    attributes:
      label: Source
      options:
        - Owner
        - User report
        - App Store review
        - Tester
        - Agent
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Brief description of the idea or feedback.
      placeholder: "e.g. Users keep asking for widget support — could drive daily engagement."
    validations:
      required: true

  - type: textarea
    id: detail
    attributes:
      label: Detail
      description: Expand on the idea, context, or feedback. Why might this matter?
    validations:
      required: false

  - type: textarea
    id: desired_outcome
    attributes:
      label: Desired Outcome (if known)
      description: What would the ideal result look like?
    validations:
      required: false

  - type: dropdown
    id: potential_impact
    attributes:
      label: Potential Impact
      options:
        - High
        - Medium
        - Low
        - Unknown
    validations:
      required: false

  - type: textarea
    id: evidence
    attributes:
      label: Supporting Material
      description: Screenshots, links, quotes, or references.
    validations:
      required: false
